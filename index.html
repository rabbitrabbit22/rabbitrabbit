<body>

    <style>
  body {

      body {
    text-align: center;
    font-family: Arial;
  }

  h1 {
    font-size: 50px;

  <div style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 15px;
  margin-top: 20px;
">
  <audio id="player" controls>
    <source src="undertale003.mp3">
  </audio>
      <br>
     <button onclick="prevSong()">Назад</button>
  <button onclick="changeSong()">Вперед</button>
</div>
   <a href="nowa.html">
  <button id="newButton">Нове</button> 
</a>
   <script>
let songs = [""];
let current = 0;

let player = document.getElementById("player");
player.src = songs[current];

player.addEventListener('ended', function() {
  current++;
  if (current >= songs.length) current = 0;
  player.src = songs[current];
  player.play();
});

function changeSong() {
  current++;
  if (current >= songs.length) current = 0;
  player.src = songs[current];
  player.play();
}

function prevSong() {
  current--;
  if (current < 0) current = songs.length - 1;
  player.src = songs[current];
  player.play();
}
</script>
</body>
