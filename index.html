<!DOCTYPE html>
<html>
<head>
  <title>My website</title>
</head>
<body>
  <h1>Привіт</h1>
  <input id="input" placeholder="Напишіть щось">
  <button onclick="reply()">Send</button>
  <p id="output"></p>
<div style="text-align: center;">
  <img src="https://i.pinimg.com/736x/ef/f5/fe/eff5fe9326e6cf885971e569118532e5.jpg" width="300" style="border-radius: 20px;">
</div>
    <style>
  body {
    background: #9966CC;
  }
      body {
    text-align: center;
    font-family: Arial;
  }

  h1 {
    font-size: 50px; 
    margin-top: 20px; 
  }

  input {
    font-size: 18px;
    padding: 10px;
    width: 250px;
  }

  button {
    font-size: 18px;
    padding: 10px 15px;
    margin-left: 5px;
  }
</style>
  <div style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #222;
  padding: 10px;
  border-radius: 15px;
">
  <audio controls loop>
    <source src="undertale003.mp3">
  </audio>
</div>
  <script>
    function reply() {
     let text = document.getElementById("input").value.toLowerCase();
      let response = "Не знаю";

      if (text.includes("привіт")) {
        response = "привіт";
      } else if (text.includes("бувай")) {
        response = "бувай";
        } else if (text.includes("крол")) {
  response = ":3";
      }

      document.getElementById("output").innerText = response;
    }
  </script>
</body>
</html>
