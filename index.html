   <script>
let songs = ["pain.mp3", "thelast.mp3"];
     let titles = ["Goreshit - the pain of relief", "Sewerslvt - the last thing she sent me"]
let current = 0;

let player = document.getElementById("player");
player.src = songs[current];

player.addEventListener('ended', function() {
  current++;
  if (current >= songs.length) current = 0;
  player.src = songs[current];
  player.play();
});

function changeSong() {
  current++;
  if (current >= songs.length) current = 0;
  player.src = songs[current];
  player.play();
}

function prevSong() {
  current--;
  if (current < 0) current = songs.length - 1;
  player.src = songs[current];
  player.play();
}
