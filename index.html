<!DOCTYPE html>
<html>
<head>
  <title>My website</title>
</head>
<body>
  <h1>Hi</h1>
  <input id="input" placeholder="Write something">
  <button onclick="reply()">Send</button>
  <p id="output"></p>
<div style="text-align: center;">
  <img src="https://i.pinimg.com/736x/ef/f5/fe/eff5fe9326e6cf885971e569118532e5.jpg" width="300" style="border-radius: 20px;">
</div>
  <script>
    function reply() {
      let text = document.getElementById("input").value;
      let response = "I don't know what to say.";

      if (text.includes("Hi")) {
        response = "Hi";
      } else if (text.includes("Bye")) {
        response = "Bye";
      }

      document.getElementById("output").innerText = response;
    }
    <style>
  body {
    background: #9966CC;
  }
</style>
  </script>
</body>
</html>
